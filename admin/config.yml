# Configuración del Backend para usar Email y Contraseña (Netlify Identity)
backend:
  name: git-gateway
  branch: main 

# Configuración de guardado de imágenes
media_folder: "assets/images/productos"
public_folder: "assets/images/productos"

# Estructura del panel para Barbi
collections:
  - name: "productos"
    label: "Productos (Joyas)"
    folder: "content/productos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{title}}"
    fields:
      - { label: "Título del Producto", name: "title", widget: "string" }
      - { label: "Precio (sin el signo $)", name: "price", widget: "string" }
      - { label: "Imagen", name: "image", widget: "image" }
      
      # Selección de la Colección Principal
      - label: "Colección (Baño)"
        name: "section"
        widget: "select"
        options: ["Acero Blanco", "Acero Dorado", "Hombres"]

      # Categoría para ACEROS (Se muestra si NO es Hombres)
      - label: "Categoría"
        name: "category"
        widget: "select"
        options: ["Anillos", "Pulseras", "Collares", "Aritos", "Cintos", "Kids"]
        condition: { field: "section", value: ["Acero Blanco", "Acero Dorado"] }

      # Categoría para HOMBRES (Se muestra SOLO si es Hombres)
      - label: "Categoría"
        name: "category"
        widget: "select"
        options: ["Todo Hombres"]
        condition: { field: "section", value: "Hombres" }
