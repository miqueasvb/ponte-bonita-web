<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias por tu mensaje!</title>
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,500,600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #fafafa;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .card {
      background: #fff;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 15px;
      color: #444;
    }
    p {
      font-size: 16px;
      margin-bottom: 25px;
      color: #666;
    }
    a {
      display: inline-block;
      padding: 12px 25px;
      border-radius: 30px;
      background: #222;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.3s ease;
    }
    a:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>¡Gracias por tu mensaje! 💌</h1>
    <p>Tu consulta fue enviada con éxito.  
    Te voy a responder lo antes posible ✨</p>
    <a href="index.html">Volver al inicio</a>
  </div>
</body>
</html>
