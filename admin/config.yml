# Configuración del Backend para usar Email y Contraseña (Netlify Identity)
backend:
  name: git-gateway
  branch: main # Asegurate de que esta sea tu rama principal (main o master)

# Configuración de guardado de imágenes
media_folder: "assets/images/productos"
public_folder: "assets/images/productos"

# Estructura del panel para Barbi
collections:
  - name: "productos"
    label: "Productos (Joyas)"
    folder: "content/productos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{title}}"
    fields:
      - { label: "Título del Producto", name: "title", widget: "string" }
      - { label: "Precio (sin el signo $)", name: "price", widget: "string" }
      - { label: "Imagen", name: "image", widget: "image" }
      - { 
          label: "Colección (Baño)", 
          name: "section", 
          widget: "select", 
          options: ["Acero Blanco", "Acero Dorado"] 
        }
      - { 
          label: "Categoría", 
          name: "category", 
          widget: "select", 
          options: ["Anillos", "Pulseras", "Collares", "Aritos", "Cintos", "Kids", "Hombres"] 
        }
